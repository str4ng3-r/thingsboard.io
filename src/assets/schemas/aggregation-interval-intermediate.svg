<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" fill="none">
  <rect width="720" height="300" fill="#fff"/>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#17181c">Intermediate results: partial aggregates during an open interval</text>

  <!-- Timeline axis -->
  <line x1="40" y1="200" x2="680" y2="200" stroke="#c1c3c8" stroke-width="1.5"/>
  <polygon points="680,200 674,196 674,204" fill="#c1c3c8"/>

  <!-- Hour markers -->
  <line x1="60" y1="195" x2="60" y2="205" stroke="#555962" stroke-width="1.5"/>
  <text x="60" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#555962">00:00</text>

  <line x1="600" y1="195" x2="600" y2="205" stroke="#555962" stroke-width="1.5"/>
  <text x="600" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#555962">01:00</text>

  <!-- Current time indicator -->
  <line x1="420" y1="55" x2="420" y2="200" stroke="#e65100" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="420" y="230" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#e65100">Now (00:40)</text>

  <!-- Full interval bracket -->
  <rect x="60" y="56" width="540" height="28" rx="4" fill="#cfd4fc" opacity="0.3"/>
  <rect x="60" y="56" width="540" height="28" rx="4" stroke="#3d50f5" stroke-width="1" fill="none"/>
  <text x="330" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#3d50f5">Current interval (00:00 - 01:00) - in progress</text>

  <!-- Completed portion (darker shade) -->
  <rect x="60" y="56" width="360" height="28" rx="4" fill="#cfd4fc" opacity="0.35"/>

  <!-- Data points received so far -->
  <circle cx="100" cy="140" r="4" fill="#3d50f5"/>
  <circle cx="150" cy="125" r="4" fill="#3d50f5"/>
  <circle cx="195" cy="155" r="4" fill="#3d50f5"/>
  <circle cx="240" cy="130" r="4" fill="#3d50f5"/>
  <circle cx="290" cy="148" r="4" fill="#3d50f5"/>
  <circle cx="340" cy="120" r="4" fill="#3d50f5"/>
  <circle cx="390" cy="142" r="4" fill="#3d50f5"/>
  <polyline points="100,140 150,125 195,155 240,130 290,148 340,120 390,142" stroke="#3d50f5" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Future portion (dimmed, no data yet) -->
  <circle cx="470" cy="135" r="4" fill="#c1c3c8" opacity="0.4"/>
  <circle cx="530" cy="145" r="4" fill="#c1c3c8" opacity="0.4"/>
  <circle cx="570" cy="128" r="4" fill="#c1c3c8" opacity="0.4"/>
  <text x="520" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#c1c3c8">Future data</text>

  <!-- Intermediate result markers (every ~5 min shown as key moments) -->
  <!-- 00:05 -->
  <line x1="105" y1="88" x2="105" y2="96" stroke="#00695c" stroke-width="1"/>
  <circle cx="105" cy="102" r="3" fill="#00695c" opacity="0.4"/>

  <!-- 00:10 -->
  <line x1="150" y1="88" x2="150" y2="96" stroke="#00695c" stroke-width="1"/>
  <circle cx="150" cy="102" r="3" fill="#00695c" opacity="0.4"/>

  <!-- 00:15 -->
  <line x1="195" y1="88" x2="195" y2="96" stroke="#00695c" stroke-width="1"/>
  <circle cx="195" cy="102" r="3" fill="#00695c" opacity="0.5"/>

  <!-- 00:20 -->
  <line x1="240" y1="88" x2="240" y2="96" stroke="#00695c" stroke-width="1"/>
  <circle cx="240" cy="102" r="3" fill="#00695c" opacity="0.5"/>

  <!-- 00:25 -->
  <line x1="285" y1="88" x2="285" y2="96" stroke="#00695c" stroke-width="1"/>
  <circle cx="285" cy="102" r="3" fill="#00695c" opacity="0.6"/>

  <!-- 00:30 -->
  <line x1="330" y1="88" x2="330" y2="96" stroke="#00695c" stroke-width="1"/>
  <circle cx="330" cy="102" r="3" fill="#00695c" opacity="0.7"/>

  <!-- 00:35 -->
  <line x1="375" y1="88" x2="375" y2="96" stroke="#00695c" stroke-width="1"/>
  <circle cx="375" cy="102" r="3" fill="#00695c" opacity="0.8"/>

  <!-- Latest intermediate result (highlighted) -->
  <line x1="420" y1="88" x2="420" y2="96" stroke="#00695c" stroke-width="1.5"/>
  <circle cx="420" cy="102" r="4" fill="#00695c"/>

  <!-- Result label for latest intermediate -->
  <rect x="430" y="93" width="130" height="20" rx="3" fill="#d6e7e5" opacity="0.6"/>
  <rect x="430" y="93" width="130" height="20" rx="3" stroke="#00695c" stroke-width="1" fill="none"/>
  <text x="495" y="107" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#00695c">avg so far = 22.9</text>

  <!-- Final result at 01:00 -->
  <rect x="575" y="93" width="100" height="20" rx="3" fill="#cfd4fc" opacity="0.4"/>
  <rect x="575" y="93" width="100" height="20" rx="3" stroke="#3d50f5" stroke-width="1" fill="none"/>
  <text x="625" y="107" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#3d50f5">Final avg=?</text>
  <line x1="600" y1="84" x2="600" y2="93" stroke="#3d50f5" stroke-width="1.5"/>
  <polygon points="600,84 596,90 604,90" fill="#3d50f5"/>

  <!-- Legend -->
  <circle cx="44" cy="252" r="4" fill="#3d50f5"/>
  <text x="54" y="256" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#555962">Telemetry data points</text>
  <circle cx="204" cy="252" r="3.5" fill="#00695c"/>
  <text x="214" y="256" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#555962">Intermediate results (every 5 min)</text>
  <line x1="410" y1="252" x2="430" y2="252" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="436" y="256" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#555962">Current time</text>
  <circle cx="504" cy="252" r="4" fill="#c1c3c8" opacity="0.4"/>
  <text x="514" y="256" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#555962">Not yet received</text>

  <!-- Note -->
  <text x="360" y="282" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888c96">Dashboards can display "current hour avg so far" using the latest intermediate result.</text>
</svg>