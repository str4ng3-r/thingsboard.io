<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" fill="none">
  <rect width="720" height="300" fill="#17181c"/>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e8e9eb">Intermediate results: partial aggregates during an open interval</text>

  <!-- Timeline axis -->
  <line x1="40" y1="200" x2="680" y2="200" stroke="#555962" stroke-width="1.5"/>
  <polygon points="680,200 674,196 674,204" fill="#555962"/>

  <!-- Hour markers -->
  <line x1="60" y1="195" x2="60" y2="205" stroke="#888c96" stroke-width="1.5"/>
  <text x="60" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#888c96">00:00</text>

  <line x1="600" y1="195" x2="600" y2="205" stroke="#888c96" stroke-width="1.5"/>
  <text x="600" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#888c96">01:00</text>

  <!-- Current time -->
  <line x1="420" y1="55" x2="420" y2="200" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="420" y="230" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#ff9800">Now (00:40)</text>

  <!-- Full interval -->
  <rect x="60" y="56" width="540" height="28" rx="4" fill="#3d50f5" opacity="0.1"/>
  <rect x="60" y="56" width="540" height="28" rx="4" stroke="#7b8aff" stroke-width="1" fill="none"/>
  <text x="330" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#7b8aff">Current interval (00:00 - 01:00) - in progress</text>

  <!-- Completed portion -->
  <rect x="60" y="56" width="360" height="28" rx="4" fill="#3d50f5" opacity="0.15"/>

  <!-- Data points -->
  <circle cx="100" cy="140" r="4" fill="#7b8aff"/>
  <circle cx="150" cy="125" r="4" fill="#7b8aff"/>
  <circle cx="195" cy="155" r="4" fill="#7b8aff"/>
  <circle cx="240" cy="130" r="4" fill="#7b8aff"/>
  <circle cx="290" cy="148" r="4" fill="#7b8aff"/>
  <circle cx="340" cy="120" r="4" fill="#7b8aff"/>
  <circle cx="390" cy="142" r="4" fill="#7b8aff"/>
  <polyline points="100,140 150,125 195,155 240,130 290,148 340,120 390,142" stroke="#7b8aff" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Future data (dimmed) -->
  <circle cx="470" cy="135" r="4" fill="#555962" opacity="0.4"/>
  <circle cx="530" cy="145" r="4" fill="#555962" opacity="0.4"/>
  <circle cx="570" cy="128" r="4" fill="#555962" opacity="0.4"/>
  <text x="520" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#555962">Future data</text>

  <!-- Intermediate markers -->
  <line x1="105" y1="88" x2="105" y2="96" stroke="#3fd9d1" stroke-width="1"/>
  <circle cx="105" cy="102" r="3" fill="#3fd9d1" opacity="0.3"/>

  <line x1="150" y1="88" x2="150" y2="96" stroke="#3fd9d1" stroke-width="1"/>
  <circle cx="150" cy="102" r="3" fill="#3fd9d1" opacity="0.35"/>

  <line x1="195" y1="88" x2="195" y2="96" stroke="#3fd9d1" stroke-width="1"/>
  <circle cx="195" cy="102" r="3" fill="#3fd9d1" opacity="0.4"/>

  <line x1="240" y1="88" x2="240" y2="96" stroke="#3fd9d1" stroke-width="1"/>
  <circle cx="240" cy="102" r="3" fill="#3fd9d1" opacity="0.5"/>

  <line x1="285" y1="88" x2="285" y2="96" stroke="#3fd9d1" stroke-width="1"/>
  <circle cx="285" cy="102" r="3" fill="#3fd9d1" opacity="0.6"/>

  <line x1="330" y1="88" x2="330" y2="96" stroke="#3fd9d1" stroke-width="1"/>
  <circle cx="330" cy="102" r="3" fill="#3fd9d1" opacity="0.7"/>

  <line x1="375" y1="88" x2="375" y2="96" stroke="#3fd9d1" stroke-width="1"/>
  <circle cx="375" cy="102" r="3" fill="#3fd9d1" opacity="0.8"/>

  <!-- Latest intermediate (highlighted) -->
  <line x1="420" y1="88" x2="420" y2="96" stroke="#3fd9d1" stroke-width="1.5"/>
  <circle cx="420" cy="102" r="4" fill="#3fd9d1"/>

  <!-- Result label -->
  <rect x="430" y="93" width="130" height="20" rx="3" fill="#00695c" opacity="0.15"/>
  <rect x="430" y="93" width="130" height="20" rx="3" stroke="#3fd9d1" stroke-width="1" fill="none"/>
  <text x="495" y="107" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#3fd9d1">avg so far = 22.9</text>

  <!-- Final result -->
  <rect x="575" y="93" width="100" height="20" rx="3" fill="#3d50f5" opacity="0.15"/>
  <rect x="575" y="93" width="100" height="20" rx="3" stroke="#7b8aff" stroke-width="1" fill="none"/>
  <text x="625" y="107" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#7b8aff">Final avg=?</text>
  <line x1="600" y1="84" x2="600" y2="93" stroke="#7b8aff" stroke-width="1.5"/>
  <polygon points="600,84 596,90 604,90" fill="#7b8aff"/>

  <!-- Legend -->
  <circle cx="44" cy="252" r="4" fill="#7b8aff"/>
  <text x="54" y="256" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888c96">Telemetry data points</text>
  <circle cx="204" cy="252" r="3.5" fill="#3fd9d1"/>
  <text x="214" y="256" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888c96">Intermediate results (every 5 min)</text>
  <line x1="410" y1="252" x2="430" y2="252" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="436" y="256" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888c96">Current time</text>
  <circle cx="504" cy="252" r="4" fill="#555962" opacity="0.4"/>
  <text x="514" y="256" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888c96">Not yet received</text>

  <!-- Note -->
  <text x="360" y="282" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666c76">Dashboards can display "current hour avg so far" using the latest intermediate result.</text>
</svg>