<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" fill="none">
  <rect width="720" height="300" fill="#17181c"/>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e8e9eb">Await timeout: waits for late data before final calculation</text>

  <!-- Timeline axis -->
  <line x1="40" y1="190" x2="680" y2="190" stroke="#555962" stroke-width="1.5"/>
  <polygon points="680,190 674,186 674,194" fill="#555962"/>

  <!-- Hour markers -->
  <line x1="80" y1="185" x2="80" y2="195" stroke="#888c96" stroke-width="1.5"/>
  <text x="80" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#888c96">00:00</text>

  <line x1="310" y1="185" x2="310" y2="195" stroke="#888c96" stroke-width="1.5"/>
  <text x="310" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#888c96">01:00</text>

  <line x1="540" y1="185" x2="540" y2="195" stroke="#888c96" stroke-width="1.5"/>
  <text x="540" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#888c96">02:00</text>

  <!-- Interval block -->
  <rect x="80" y="60" width="230" height="28" rx="4" fill="#3d50f5" opacity="0.15"/>
  <rect x="80" y="60" width="230" height="28" rx="4" stroke="#7b8aff" stroke-width="1" fill="none"/>
  <text x="195" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#7b8aff">Interval (00:00 - 01:00)</text>

  <!-- Await timeout zone -->
  <rect x="310" y="60" width="50" height="28" rx="4" fill="#e65100" opacity="0.1"/>
  <rect x="310" y="60" width="50" height="28" rx="4" stroke="#ff9800" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  <text x="335" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#ff9800">Wait</text>

  <!-- Timeout annotation -->
  <line x1="310" y1="48" x2="360" y2="48" stroke="#ff9800" stroke-width="1"/>
  <line x1="310" y1="44" x2="310" y2="52" stroke="#ff9800" stroke-width="1"/>
  <line x1="360" y1="44" x2="360" y2="52" stroke="#ff9800" stroke-width="1"/>
  <text x="335" y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ff9800">5 min timeout</text>

  <!-- On-time data -->
  <circle cx="120" cy="140" r="4" fill="#7b8aff"/>
  <circle cx="170" cy="125" r="4" fill="#7b8aff"/>
  <circle cx="220" cy="150" r="4" fill="#7b8aff"/>
  <circle cx="270" cy="130" r="4" fill="#7b8aff"/>
  <polyline points="120,140 170,125 220,150 270,130" stroke="#7b8aff" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Late data -->
  <circle cx="330" cy="145" r="5" fill="#ff9800" stroke="#17181c" stroke-width="1.5"/>
  <text x="330" y="165" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#ff9800">Late data</text>
  <line x1="330" y1="145" x2="270" y2="135" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>

  <!-- Output arrow -->
  <line x1="360" y1="88" x2="360" y2="100" stroke="#7b8aff" stroke-width="1.5"/>
  <polygon points="360,104 356,98 364,98" fill="#7b8aff"/>

  <!-- Result box -->
  <rect x="380" y="96" width="155" height="24" rx="4" fill="#3d50f5" opacity="0.15"/>
  <rect x="380" y="96" width="155" height="24" rx="4" stroke="#7b8aff" stroke-width="1" fill="none"/>
  <text x="457" y="112" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#7b8aff">Final: avg=24.8 (incl. late)</text>

  <!-- Second interval -->
  <rect x="360" y="60" width="180" height="28" rx="4" fill="#00695c" opacity="0.15"/>
  <rect x="360" y="60" width="180" height="28" rx="4" stroke="#3fd9d1" stroke-width="1" fill="none"/>
  <text x="450" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#3fd9d1">Interval (01:00 - 02:00)</text>

  <!-- Legend -->
  <circle cx="44" cy="240" r="4" fill="#7b8aff"/>
  <text x="54" y="244" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888c96">On-time telemetry</text>
  <circle cx="184" cy="240" r="5" fill="#ff9800" stroke="#17181c" stroke-width="1.5"/>
  <text x="196" y="244" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888c96">Late telemetry (included in prior interval)</text>
  <rect x="420" y="236" width="30" height="8" rx="2" fill="#e65100" opacity="0.1" stroke="#ff9800" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="456" y="244" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888c96">Await timeout window</text>

  <!-- Note -->
  <text x="360" y="275" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666c76">Late data that arrives after the timeout triggers a recalculation of the affected interval.</text>
</svg>