<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" fill="none">
  <rect width="720" height="280" fill="#fff"/>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#17181c">Apply offset: shifts interval boundaries by a fixed amount</text>

  <!-- Timeline axis -->
  <line x1="40" y1="180" x2="680" y2="180" stroke="#c1c3c8" stroke-width="1.5"/>
  <!-- Arrow -->
  <polygon points="680,180 674,176 674,184" fill="#c1c3c8"/>

  <!-- Hour markers on timeline -->
  <line x1="100" y1="175" x2="100" y2="185" stroke="#555962" stroke-width="1.5"/>
  <text x="100" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#555962">00:00</text>

  <line x1="290" y1="175" x2="290" y2="185" stroke="#555962" stroke-width="1.5"/>
  <text x="290" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#555962">01:00</text>

  <line x1="480" y1="175" x2="480" y2="185" stroke="#555962" stroke-width="1.5"/>
  <text x="480" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#555962">02:00</text>

  <!-- Offset markers (dashed) -->
  <line x1="140" y1="60" x2="140" y2="180" stroke="#3d50f5" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="140" y="215" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#3d50f5">00:10</text>

  <line x1="330" y1="60" x2="330" y2="180" stroke="#3d50f5" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="330" y="215" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#3d50f5">01:10</text>

  <line x1="520" y1="60" x2="520" y2="180" stroke="#3d50f5" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="520" y="215" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#3d50f5">02:10</text>

  <!-- Offset arrow annotation -->
  <line x1="100" y1="235" x2="140" y2="235" stroke="#3d50f5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="120" y="252" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#3d50f5">+10 min</text>

  <!-- Interval bracket 1: 00:10 to 01:10 -->
  <rect x="140" y="66" width="190" height="28" rx="4" fill="#cfd4fc" opacity="0.4"/>
  <rect x="140" y="66" width="190" height="28" rx="4" stroke="#3d50f5" stroke-width="1" fill="none"/>
  <text x="235" y="84" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#3d50f5">Interval 1</text>

  <!-- Interval bracket 2: 01:10 to 02:10 -->
  <rect x="330" y="66" width="190" height="28" rx="4" fill="#d6e7e5" opacity="0.4"/>
  <rect x="330" y="66" width="190" height="28" rx="4" stroke="#00695c" stroke-width="1" fill="none"/>
  <text x="425" y="84" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#00695c">Interval 2</text>

  <!-- Data points (small dots on timeline) -->
  <!-- Interval 1 data points -->
  <circle cx="165" cy="140" r="4" fill="#3d50f5"/>
  <circle cx="210" cy="125" r="4" fill="#3d50f5"/>
  <circle cx="250" cy="150" r="4" fill="#3d50f5"/>
  <circle cx="295" cy="130" r="4" fill="#3d50f5"/>

  <!-- Interval 2 data points -->
  <circle cx="355" cy="145" r="4" fill="#00695c"/>
  <circle cx="400" cy="120" r="4" fill="#00695c"/>
  <circle cx="450" cy="155" r="4" fill="#00695c"/>
  <circle cx="495" cy="135" r="4" fill="#00695c"/>

  <!-- Data point line connections -->
  <polyline points="165,140 210,125 250,150 295,130" stroke="#3d50f5" stroke-width="1" fill="none" opacity="0.5"/>
  <polyline points="355,145 400,120 450,155 495,135" stroke="#00695c" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Output arrows -->
  <line x1="330" y1="94" x2="330" y2="106" stroke="#3d50f5" stroke-width="1.5"/>
  <polygon points="330,110 326,104 334,104" fill="#3d50f5"/>
  <text x="330" y="122" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#3d50f5">avg=24.3</text>

  <!-- Legend -->
  <rect x="40" y="44" width="8" height="8" rx="4" fill="#555962"/>
  <text x="54" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#555962">Standard boundary</text>
  <line x1="170" y1="48" x2="190" y2="48" stroke="#3d50f5" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="196" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#3d50f5">Offset boundary (actual interval start/end)</text>

  <!-- Standard boundary dots in legend -->
  <circle cx="44" cy="48" r="4" fill="#555962"/>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3d50f5"/>
    </marker>
  </defs>
</svg>