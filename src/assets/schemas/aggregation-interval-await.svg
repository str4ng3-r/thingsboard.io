<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" fill="none">
  <rect width="720" height="300" fill="#fff"/>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#17181c">Await timeout: waits for late data before final calculation</text>

  <!-- Timeline axis -->
  <line x1="40" y1="190" x2="680" y2="190" stroke="#c1c3c8" stroke-width="1.5"/>
  <polygon points="680,190 674,186 674,194" fill="#c1c3c8"/>

  <!-- Hour markers -->
  <line x1="80" y1="185" x2="80" y2="195" stroke="#555962" stroke-width="1.5"/>
  <text x="80" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#555962">00:00</text>

  <line x1="310" y1="185" x2="310" y2="195" stroke="#555962" stroke-width="1.5"/>
  <text x="310" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#555962">01:00</text>

  <line x1="540" y1="185" x2="540" y2="195" stroke="#555962" stroke-width="1.5"/>
  <text x="540" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#555962">02:00</text>

  <!-- Interval block: 00:00 to 01:00 -->
  <rect x="80" y="60" width="230" height="28" rx="4" fill="#cfd4fc" opacity="0.4"/>
  <rect x="80" y="60" width="230" height="28" rx="4" stroke="#3d50f5" stroke-width="1" fill="none"/>
  <text x="195" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#3d50f5">Interval (00:00 - 01:00)</text>

  <!-- Await timeout zone: 01:00 to 01:05 -->
  <rect x="310" y="60" width="50" height="28" rx="4" fill="#fff3e0" opacity="0.6"/>
  <rect x="310" y="60" width="50" height="28" rx="4" stroke="#e65100" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  <text x="335" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#e65100">Wait</text>

  <!-- Await timeout annotation -->
  <line x1="310" y1="48" x2="360" y2="48" stroke="#e65100" stroke-width="1"/>
  <line x1="310" y1="44" x2="310" y2="52" stroke="#e65100" stroke-width="1"/>
  <line x1="360" y1="44" x2="360" y2="52" stroke="#e65100" stroke-width="1"/>
  <text x="335" y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e65100">5 min timeout</text>

  <!-- On-time data points (blue) -->
  <circle cx="120" cy="140" r="4" fill="#3d50f5"/>
  <circle cx="170" cy="125" r="4" fill="#3d50f5"/>
  <circle cx="220" cy="150" r="4" fill="#3d50f5"/>
  <circle cx="270" cy="130" r="4" fill="#3d50f5"/>
  <polyline points="120,140 170,125 220,150 270,130" stroke="#3d50f5" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Late data point (orange, arrives after boundary but within timeout) -->
  <circle cx="330" cy="145" r="5" fill="#e65100" stroke="#fff" stroke-width="1.5"/>
  <text x="330" y="165" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#e65100">Late data</text>
  <!-- Dashed line showing it belongs to interval 1 -->
  <line x1="330" y1="145" x2="270" y2="135" stroke="#e65100" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>

  <!-- Calculation output at end of await -->
  <line x1="360" y1="88" x2="360" y2="100" stroke="#3d50f5" stroke-width="1.5"/>
  <polygon points="360,104 356,98 364,98" fill="#3d50f5"/>

  <!-- Result box -->
  <rect x="380" y="96" width="155" height="24" rx="4" fill="#cfd4fc" opacity="0.4"/>
  <rect x="380" y="96" width="155" height="24" rx="4" stroke="#3d50f5" stroke-width="1" fill="none"/>
  <text x="457" y="112" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#3d50f5">Final: avg=24.8 (incl. late)</text>

  <!-- Second interval starts after timeout -->
  <rect x="360" y="60" width="180" height="28" rx="4" fill="#d6e7e5" opacity="0.4"/>
  <rect x="360" y="60" width="180" height="28" rx="4" stroke="#00695c" stroke-width="1" fill="none"/>
  <text x="450" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#00695c">Interval (01:00 - 02:00)</text>

  <!-- Legend -->
  <circle cx="44" cy="240" r="4" fill="#3d50f5"/>
  <text x="54" y="244" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#555962">On-time telemetry</text>
  <circle cx="184" cy="240" r="5" fill="#e65100" stroke="#fff" stroke-width="1.5"/>
  <text x="196" y="244" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#555962">Late telemetry (included in prior interval)</text>
  <rect x="420" y="236" width="30" height="8" rx="2" fill="#fff3e0" opacity="0.6" stroke="#e65100" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="456" y="244" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#555962">Await timeout window</text>

  <!-- Note at bottom -->
  <text x="360" y="275" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888c96">Late data that arrives after the timeout triggers a recalculation of the affected interval.</text>
</svg>